<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Count Unknown Art</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-main: #f0f0f0;
            --accent: #444444;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 3rem 1rem;
            border-bottom: 1px solid var(--accent);
        }
        .logo { max-width: 120px; margin-bottom: 10px; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .art-card {
            background: #1a1a1a;
            border: 1px solid var(--accent);
            border-radius: 8px;
            overflow: hidden;
        }
        .art-card img {
            width: 100%;
            height: auto;
            display: block;
        }
        .art-info { padding: 15px; text-align: center; }
        footer { text-align: center; padding: 2rem; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <img src="BCUlogoT.png" alt="Logo" class="logo">
        <h1>Body Count Unknown Art</h1>
    </header>

    <div class="container">
        <section class="gallery-grid">
            
            <div class="art-card">
                <img src="EmeraldGate.jpg" alt="Emerald Gate">
                <div class="art-info"><h3>Emerald Gate</h3></div>
            </div>

            <div class="art-card">
                <img src="FutureSeeker.jpg" alt="Future Seeker">
                <div class="art-info"><h3>Future Seeker</h3></div>
            </div>

            <div class="art-card">
                <img src="Golden-Gaze.jpg" alt="Golden Gaze">
                <div class="art-info"><h3>Golden Gaze</h3></div>
            </div>

            <div class="art-card">
                <img src="Mask-Artwork.jpg" alt="Mask">
                <div class="art-info"><h3>Mask Artwork</h3></div>
            </div>

            <div class="art-card">
                <img src="Pick-Your-Poison.jpg" alt="Pick Your Poison">
                <div class="art-info"><h3>Pick Your Poison</h3></div>
            </div>

            <div class="art-card">
                <img src="Psybo-Villian.jpg" alt="Psybo Villian">
                <div class="art-info"><h3>Psybo Villian</h3></div>
            </div>

            <div class="art-card">
                <img src="Void-Sight.jpg" alt="Void Sight">
                <div class="art-info"><h3>Void Sight</h3></div>
            </div>

        </section>
    </div>

    <footer>
        <p>&copy; 2026 Body Count Unknown Art | Brett Ross</p>
    </footer>

</body>
</html>
