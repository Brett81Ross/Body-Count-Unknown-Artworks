<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BODY COUNT UNKNOWN</title>
    <style>
        /* --- BRAND IDENTITY SYSTEM --- */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #777777;
            --toxic-green: #8ce62c;
            --border-color: #222222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace; /* Hard, industrial default font */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* --- HEADER / NAVIGATION --- */
        header {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            letter-spacing: 2px;
        }

        .brand-logo-text {
            font-weight: 900;
            font-size: 1.2rem;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 20px;
            transition: color 0.3s ease;
            font-size: 0.9rem;
        }

        nav a:hover {
            color: var(--toxic-green);
        }

        /* --- HERO HERO HERO SECTION --- */
        .hero-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* Vector Logo Container */
        .logo-showcase {
            width: 100%;
            max-width: 280px; /* Controls the size of the logo on screen */
            margin-bottom: 30px;
            filter: drop-shadow(0 0 15px rgba(140, 230, 44, 0.15));
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-subtitle {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* --- THE DROP GATEKEEPER (EMAIL CAPTURE) --- */
        .drop-signup-box {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 4px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 80px;
        }

        .drop-signup-box h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .form-group {
            display: flex;
            gap: 10px;
        }

        .form-group input {
            flex: 1;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 12px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .form-group input:focus {
            border-color: var(--toxic-green);
        }

        .form-group button {
            background-color: var(--text-main);
            color: var(--bg-color);
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }

        .form-group button:hover {
            background-color: var(--toxic-green);
        }

        /* --- PREVIEW GRID --- */
        .section-label {
            width: 100%;
            max-width: 1160px;
            text-align: left;
            margin-bottom: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 100px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            width: 100%;
            max-width: 1160px;
            margin-top: -60px;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            text-align: left;
            position: relative;
        }

        .product-status {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 0.7rem;
            background-color: #ff3333;
            color: #fff;
            padding: 3px 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .product-image-placeholder {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: var(--bg-color);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #222;
            color: #444;
        }

        .product-title {
            font-size: 1rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .product-price {
            color: var(--toxic-green);
            font-size: 0.9rem;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 1.8rem; }
            .form-group { flex-direction: column; }
            .form-group button { padding: 12px; }
            header { padding: 20px; }
        }
    </style>
</head>
