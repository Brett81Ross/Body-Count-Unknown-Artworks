<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Count Unknown Art | Art by Brett Ross</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --accent: #444444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 4rem 1rem;
            background: linear-gradient(to bottom, #1a1a1a, var(--bg-color));
            border-bottom: 1px solid var(--accent);
        }

        .logo {
            max-width: 150px;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 0;
        }

        .subtitle {
            color: var(--text-muted);
            font-style: italic;
            margin-top: 0.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .art-card {
            background-color: #1a1a1a;
            border: 1px solid var(--accent);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .art-card:hover {
            transform: scale(1.02);
            border-color: #666;
        }

        .art-card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
        }

        .art-info {
            padding: 1.5rem;
            text-align: center;
        }

        .art-info h3 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <header>
        <img src="BCUlogoT.png" alt="BCU Logo" class="logo">
        <h1>Body Count Unknown Art</h1>
        <p class="subtitle">Mixed-Media & Biomechanical Art by Brett Ross</p>
    </header>

    <div class="container">
        <section class="gallery-grid">
            
            <div class="art-card">
                <img src="EmeraldGate.jpg" alt="Emerald Gate">
                <div class="art-info"><h3>Emerald Gate</h3></div>
            </div>

            <div class="art-card">
                <img src="FutureSeeker.jpg" alt="Future Seeker">
                <div class="art-info"><h3>Future Seeker</h3></div>
            </div>

            <div class="art-card">
                <img src="Golden-Gaze.jpg" alt="Golden Gaze">
                <div class="art-info"><h3>Golden Gaze</h3></div>
            </div>

            <div class="art-card">
                <img src="Mask-Artwork.jpg" alt="Mask Artwork">
                <div class="art-info"><h3>Mask Artwork</h3></div>
            </div>

            <div class="art-card">
                <img src="Pick-Your-Poison.jpg" alt="Pick Your Poison">
                <div class="art-info"><h3>Pick Your Poison</h3></div>
            </div>

            <div class="art-card">
                <img src="Psybo-Villian.jpg" alt="Psybo Villian">
                <div class="art-info"><h3>Psybo Villian</h3></div>
            </div>

            <div class="art-card">
                <img src="Void-Sight.jpg" alt="Void Sight">
                <div class="art-info"><h3>Void Sight</h3></div>
            </div>

        </section>
    </div>

    <footer>
        <p>&copy; 2026 Body Count Unknown Art | Brett Ross</p>
    </footer>

</body>
</html>
