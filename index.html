<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Count Gallery</title>
    <style>
        body { background-color: #111; color: white; font-family: sans-serif; text-align: center; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
        }
        .gallery img {
            width: 100%;
            height: auto;
            border: 2px solid #333;
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .gallery img:hover { transform: scale(1.05); border-color: #888; }
    </style>
</head>
<body>

    <h1>Body Count Gallery</h1>

    <div class="gallery">
        <!-- Replace 'Screenshot_Name.png' with your actual filenames from image.png -->
        <img src="Docs/Screenshot_202..." alt="Artwork 1">
        <img src="Docs/Screenshot_202..." alt="Artwork 2">
        <img src="Docs/Screenshot_202..." alt="Artwork 3">
        <img src="Docs/Screenshot_202..." alt="Artwork 4">
        <!-- Add more img tags for every file seen in your repository -->
    </div>

</body>
</html>
